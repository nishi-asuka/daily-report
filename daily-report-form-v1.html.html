<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>葬祭事務 日報入力フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .time-slot { transition: all 0.2s ease; }
        .time-slot:hover { background-color: #f0f9ff; }
        .time-slot.active { background-color: #dbeafe; border-left: 4px solid #0ea5e9; }
        .export-btn { transition: all 0.3s ease; }
        .export-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50">

<!-- ヘッダー -->
<div class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-4">
        <h1 class="text-2xl font-bold text-gray-800">葬祭事務 日報入力</h1>
        <p class="text-sm text-gray-500 mt-1">30分単位で業務内容を記録</p>
    </div>
</div>

<!-- メインコンテナ -->
<div class="max-w-2xl mx-auto px-4 py-6">

    <!-- ヘッダー情報セクション -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">報告日</label>
                <input type="date" id="reportDate" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">氏名</label>
                <input type="text" id="userName" placeholder="例：太郎" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">出勤区分</label>
                <select id="attendanceType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">選択してください</option>
                    <option value="通常">通常勤務</option>
                    <option value="短縮">短縮勤務</option>
                    <option value="半日">半日勤務</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">管理者</label>
                <input type="text" id="managerName" placeholder="確認者名" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
    </div>

    <!-- TODO入力セクション -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">本日のTODO</h2>
        <div id="todoList" class="space-y-3">
            <div class="flex gap-2">
                <select class="flex-shrink-0 px-2 py-1 border border-gray-300 rounded text-sm bg-white">
                    <option value="高">高</option>
                    <option value="中">中</option>
                    <option value="低">低</option>
                </select>
                <input type="text" placeholder="TODO項目を入力" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="removeTodo(this)" class="px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100 text-sm font-medium">削除</button>
            </div>
        </div>
        <button onclick="addTodo()" class="mt-4 w-full px-3 py-2 bg-blue-100 text-blue-700 rounded-lg font-medium hover:bg-blue-200 transition">+ TODO追加</button>
    </div>

    <!-- 業務カテゴリ定義（折りたたみ） -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
        <button onclick="toggleCategories()" class="w-full flex justify-between items-center text-lg font-bold text-gray-800 pb-2 border-b">
            <span>業務カテゴリ設定</span>
            <span id="categoryToggleIcon" class="text-2xl">▼</span>
        </button>
        <div id="categoryPanel" class="hidden mt-4">
            <p class="text-sm text-gray-600 mb-3">カテゴリを行ごとに編集（改行区切り）</p>
            <textarea id="categoryList" class="w-full h-32 p-3 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="遺族相談・受付&#10;見積・提案作成&#10;契約・書類処理&#10;...">遺族相談・受付
見積・提案作成
契約・書類処理
支払・決算処理
返礼品・ギフト手配
火葬場・式場調整
備品・在庫管理
会議・ミーティング
事務作業（その他）</textarea>
            <button onclick="saveCategories()" class="mt-2 w-full px-3 py-2 bg-green-100 text-green-700 rounded-lg font-medium hover:bg-green-200 transition">カテゴリ保存</button>
        </div>
    </div>

    <!-- 実行業務記録セクション -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">実行業務記録 9:00-18:00</h2>
        <div id="timeSlots" class="space-y-2">
            <!-- JavaScriptで動的に生成 -->
        </div>
    </div>

    <!-- 所感セクション -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3">本日の所感・気づき</h2>
        <textarea id="impression" placeholder="本日の振り返り、気づきなどを記入" class="w-full h-24 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
    </div>

    <!-- 管理者確認セクション -->
    <div class="bg-yellow-50 border-l-4 border-yellow-400 rounded-lg p-4 mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-3">管理者確認欄</h2>
        <div class="mb-3">
            <label class="inline-flex items-center">
                <input type="checkbox" id="managerApproval" class="w-5 h-5 text-blue-600 rounded focus:ring-2 focus:ring-blue-500">
                <span class="ml-2 text-sm font-medium text-gray-700">承認</span>
            </label>
        </div>
        <textarea id="managerFeedback" placeholder="フィードバック記入欄" class="w-full h-16 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
    </div>

    <!-- アクションボタン -->
    <div class="flex flex-col gap-3 mb-8">
        <button onclick="saveToDraft()" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition export-btn">💾 ローカルに保存</button>
        <button onclick="exportToCSV()" class="w-full px-4 py-3 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition export-btn">📊 CSVでエクスポート</button>
        <button onclick="clearForm()" class="w-full px-4 py-3 bg-gray-400 text-white rounded-lg font-bold hover:bg-gray-500 transition">🗑️ クリア</button>
    </div>

    <!-- ステータスメッセージ -->
    <div id="statusMessage" class="hidden fixed bottom-4 right-4 px-4 py-3 bg-green-500 text-white rounded-lg shadow-lg text-sm font-medium"></div>

</div>

<script>
// ===== グローバル変数 =====
let timeSlots = [];

// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
    initReportDate();
    generateTimeSlots();
    loadDraft();
});

/**
 * 報告日を今日の日付で初期化
 */
function initReportDate() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('reportDate').value = today;
}

/**
 * 30分単位の時間スロットを生成（9:00-18:00 = 18行）
 */
function generateTimeSlots() {
    const container = document.getElementById('timeSlots');
    container.innerHTML = '';
    timeSlots = [];
    
    let hour = 9, minute = 0;
    for (let i = 0; i < 18; i++) {
        const timeStr = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
        const slotId = `slot-${i}`;
        
        const slot = {
            id: slotId,
            time: timeStr,
            plan: '',
            activity: '',
            category: '',
            completed: false
        };
        timeSlots.push(slot);
        
        const html = `
            <div class="time-slot border border-gray-200 rounded-lg p-3 cursor-pointer hover:shadow-md" id="${slotId}">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-2">
                    <div>
                        <label class="text-xs font-semibold text-gray-600">時刻</label>
                        <div class="font-mono text-lg font-bold text-gray-800">${timeStr}</div>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-600">TODO時点</label>
                        <input type="text" class="w-full px-2 py-1 text-sm border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="予定" data-field="plan">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-600">実行内容</label>
                        <input type="text" class="w-full px-2 py-1 text-sm border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-blue-400" placeholder="業務内容" data-field="activity">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-600">カテゴリ</label>
                        <select class="w-full px-2 py-1 text-sm border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-blue-400" data-field="category">
                            <option value="">選択</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 text-blue-600 rounded focus:ring-1 focus:ring-blue-400" data-field="completed">
                            <span class="ml-1 text-xs font-semibold text-gray-600">完了</span>
                        </label>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += html;
        
        minute += 30;
        if (minute === 60) {
            minute = 0;
            hour++;
        }
    }
    
    populateCategories();
    attachSlotListeners();
}

/**
 * 各時間スロットのインプット値変更をリスナーに接続
 */
function attachSlotListeners() {
    document.querySelectorAll('.time-slot').forEach((slot, idx) => {
        const inputs = slot.querySelectorAll('[data-field]');
        inputs.forEach(inp => {
            inp.addEventListener('change', () => {
                const field = inp.getAttribute('data-field');
                if (field === 'completed') {
                    timeSlots[idx][field] = inp.checked;
                } else {
                    timeSlots[idx][field] = inp.value;
                }
            });
            inp.addEventListener('input', () => {
                const field = inp.getAttribute('data-field');
                if (field !== 'completed') {
                    timeSlots[idx][field] = inp.value;
                }
            });
        });
    });
}

/**
 * カテゴリドロップダウンに選択肢を追加
 */
function populateCategories() {
    const cats = document.getElementById('categoryList').value.split('\n').filter(c => c.trim());
    document.querySelectorAll('[data-field="category"]').forEach(select => {
        select.innerHTML = '<option value="">選択</option>' + 
            cats.map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
    });
}

/**
 * カテゴリ折りたたみ切り替え
 */
function toggleCategories() {
    const panel = document.getElementById('categoryPanel');
    const icon = document.getElementById('categoryToggleIcon');
    panel.classList.toggle('hidden');
    icon.textContent = panel.classList.contains('hidden') ? '▼' : '▲';
}

/**
 * カテゴリ保存＋再生成
 */
function saveCategories() {
    localStorage.setItem('categories', document.getElementById('categoryList').value);
    populateCategories();
    showStatus('✓ カテゴリを保存しました');
}

/**
 * TODO追加
 */
function addTodo() {
    const list = document.getElementById('todoList');
    const newTodo = document.createElement('div');
    newTodo.className = 'flex gap-2';
    newTodo.innerHTML = `
        <select class="flex-shrink-0 px-2 py-1 border border-gray-300 rounded text-sm bg-white">
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
        </select>
        <input type="text" placeholder="TODO項目を入力" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="removeTodo(this)" class="px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100 text-sm font-medium">削除</button>
    `;
    list.appendChild(newTodo);
}

/**
 * TODO削除
 */
function removeTodo(btn) {
    btn.parentElement.remove();
}

/**
 * ローカルストレージに保存
 */
function saveToDraft() {
    const data = {
        date: document.getElementById('reportDate').value,
        userName: document.getElementById('userName').value,
        attendance: document.getElementById('attendanceType').value,
        manager: document.getElementById('managerName').value,
        todos: Array.from(document.getElementById('todoList').children).map(row => ({
            priority: row.querySelector('select').value,
            text: row.querySelector('input[type="text"]').value
        })),
        timeSlots: timeSlots,
        impression: document.getElementById('impression').value,
        managerApproval: document.getElementById('managerApproval').checked,
        managerFeedback: document.getElementById('managerFeedback').value
    };
    localStorage.setItem('draftReport', JSON.stringify(data));
    showStatus('✓ ドラフトを保存しました');
}

/**
 * ドラフトを読み込み
 */
function loadDraft() {
    const draft = localStorage.getItem('draftReport');
    if (!draft) return;
    
    const data = JSON.parse(draft);
    document.getElementById('reportDate').value = data.date || '';
    document.getElementById('userName').value = data.userName || '';
    document.getElementById('attendanceType').value = data.attendance || '';
    document.getElementById('managerName').value = data.manager || '';
    document.getElementById('impression').value = data.impression || '';
    document.getElementById('managerApproval').checked = data.managerApproval || false;
    document.getElementById('managerFeedback').value = data.managerFeedback || '';
    
    // TODO復元
    const todoList = document.getElementById('todoList');
    todoList.innerHTML = '';
    if (data.todos && data.todos.length > 0) {
        data.todos.forEach(todo => {
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `
                <select class="flex-shrink-0 px-2 py-1 border border-gray-300 rounded text-sm bg-white">
                    <option value="高" ${todo.priority === '高' ? 'selected' : ''}>高</option>
                    <option value="中" ${todo.priority === '中' ? 'selected' : ''}>中</option>
                    <option value="低" ${todo.priority === '低' ? 'selected' : ''}>低</option>
                </select>
                <input type="text" placeholder="TODO項目を入力" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" value="${todo.text}">
                <button onclick="removeTodo(this)" class="px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100 text-sm font-medium">削除</button>
            `;
            todoList.appendChild(div);
        });
    }
    
    // 時間スロット復元
    if (data.timeSlots && data.timeSlots.length > 0) {
        data.timeSlots.forEach((slot, idx) => {
            if (idx < timeSlots.length) {
                timeSlots[idx] = { ...timeSlots[idx], ...slot };
                const elem = document.getElementById(slot.id);
                if (elem) {
                    elem.querySelector('[data-field="plan"]').value = slot.plan || '';
                    elem.querySelector('[data-field="activity"]').value = slot.activity || '';
                    elem.querySelector('[data-field="category"]').value = slot.category || '';
                    elem.querySelector('[data-field="completed"]').checked = slot.completed || false;
                }
            }
        });
    }
}

/**
 * フォームをクリア
 */
function clearForm() {
    if (!confirm('すべての入力内容をクリアしますか？')) return;
    document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('userName').value = '';
    document.getElementById('attendanceType').value = '';
    document.getElementById('managerName').value = '';
    document.getElementById('impression').value = '';
    document.getElementById('managerApproval').checked = false;
    document.getElementById('managerFeedback').value = '';
    
    document.getElementById('todoList').innerHTML = `
        <div class="flex gap-2">
            <select class="flex-shrink-0 px-2 py-1 border border-gray-300 rounded text-sm bg-white">
                <option value="高">高</option>
                <option value="中">中</option>
                <option value="低">低</option>
            </select>
            <input type="text" placeholder="TODO項目を入力" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="removeTodo(this)" class="px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100 text-sm font-medium">削除</button>
        </div>
    `;
    
    document.querySelectorAll('[data-field="plan"]').forEach(inp => inp.value = '');
    document.querySelectorAll('[data-field="activity"]').forEach(inp => inp.value = '');
    document.querySelectorAll('[data-field="category"]').forEach(inp => inp.value = '');
    document.querySelectorAll('[data-field="completed"]').forEach(inp => inp.checked = false);
    
    showStatus('✓ フォームをクリアしました');
}

/**
 * CSV形式でエクスポート
 * Excelで開きやすいカンマ区切り形式
 */
function exportToCSV() {
    saveToDraft();
    
    const date = document.getElementById('reportDate').value;
    const userName = document.getElementById('userName').value;
    const attendance = document.getElementById('attendanceType').value;
    
    // CSVヘッダー
    let csv = '報告日,氏名,出勤区分,時刻,TODO時点,実行内容,業務カテゴリ,完了\n';
    
    // 時間スロットデータ
    timeSlots.forEach(slot => {
        // CSV用にダブルクォーテーション処理
        const escape = (str) => {
            if (str && (str.includes(',') || str.includes('"') || str.includes('\n'))) {
                return '"' + str.replace(/"/g, '""') + '"';
            }
            return str || '';
        };
        
        csv += `${escape(date)},${escape(userName)},${escape(attendance)},${escape(slot.time)},${escape(slot.plan)},${escape(slot.activity)},${escape(slot.category)},${slot.completed ? '✓' : ''}\n`;
    });
    
    // CSV をダウンロード
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `日報_${userName}_${date}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    showStatus('✓ CSV形式でエクスポートしました（Excelで開く際は「UTF-8 BOM」を選択）');
}

/**
 * ステータスメッセージ表示
 */
function showStatus(message) {
    const msg = document.getElementById('statusMessage');
    msg.textContent = message;
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 3000);
}

// カテゴリ読み込み
const savedCats = localStorage.getItem('categories');
if (savedCats) {
    document.getElementById('categoryList').value = savedCats;
}
</script>

</body>
</html>
